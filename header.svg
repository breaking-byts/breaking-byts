<svg fill="none" viewBox="0 0 850 220" width="100%" xmlns="http://www.w3.org/2000/svg">
  <style>
    .silk { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #E9ECEF; }
    .silk-sub { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #8FBFA6; }
    .silk-dim { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #5A8A6E; }
    .ref { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; fill: #5A8A6E; font-size: 9px; }
    .trace { stroke: #C9872E; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .trace-t { stroke: #C9872E; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Soldermask -->
  <rect width="100%" height="100%" fill="#1B4332" rx="3" />

  <!-- Substrate grid -->
  <defs>
    <pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1F5038" stroke-width="0.5" />
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#g)" />

  <!-- Board edge cut -->
  <rect x="8" y="8" width="834" height="204" rx="2" stroke="#264D3B" stroke-width="1.5" fill="none" />

  <!-- Fiducial marks -->
  <path d="M 18 12 L 12 12 L 12 18" stroke="#2D6B47" stroke-width="1.5" fill="none" />
  <path d="M 832 12 L 838 12 L 838 18" stroke="#2D6B47" stroke-width="1.5" fill="none" />
  <path d="M 12 202 L 12 208 L 18 208" stroke="#2D6B47" stroke-width="1.5" fill="none" />
  <path d="M 838 202 L 838 208 L 832 208" stroke="#2D6B47" stroke-width="1.5" fill="none" />

  <!-- ═══ COPPER LAYER ═══ -->

  <!-- Trace A: top-left bus, 45° jog to via -->
  <path d="M 8 35 L 155 35 L 185 65" class="trace" />

  <!-- Trace B: left mid-height, angles up to via -->
  <path d="M 8 100 L 45 100 L 70 75" class="trace-t" />

  <!-- Trace C: top-right, via junction to horizontal run -->
  <path d="M 660 45 L 695 45 L 720 70" class="trace" />
  <path d="M 720 70 L 842 70" class="trace-t" />

  <!-- Trace D: bottom-left horizontal to via -->
  <path d="M 8 190 L 140 190" class="trace-t" />

  <!-- Trace E: bottom-right, via angles up to horizontal run -->
  <path d="M 700 190 L 730 160" class="trace-t" />
  <path d="M 730 160 L 842 160" class="trace-t" />

  <!-- Trace F: right-side vertical route connecting two vias -->
  <path d="M 720 70 L 730 80 L 730 120 L 745 135" class="trace-t" />

  <!-- ═══ VIA LAYER ═══ -->

  <!-- Via: Trace A terminus -->
  <circle cx="185" cy="65" r="5.5" fill="#1B4332" stroke="#C9872E" stroke-width="2" />
  <circle cx="185" cy="65" r="2" fill="#F4C430" />

  <!-- Via: Trace B terminus -->
  <circle cx="70" cy="75" r="5" fill="#1B4332" stroke="#C9872E" stroke-width="1.8" />
  <circle cx="70" cy="75" r="1.8" fill="#F4C430" />

  <!-- Via: Trace C junction -->
  <circle cx="720" cy="70" r="5.5" fill="#1B4332" stroke="#C9872E" stroke-width="2" />
  <circle cx="720" cy="70" r="2" fill="#F4C430" />

  <!-- Via: Trace D terminus -->
  <circle cx="140" cy="190" r="5" fill="#1B4332" stroke="#C9872E" stroke-width="1.8" />
  <circle cx="140" cy="190" r="1.8" fill="#F4C430" />

  <!-- Via: Trace E origin -->
  <circle cx="700" cy="190" r="5" fill="#1B4332" stroke="#C9872E" stroke-width="1.8" />
  <circle cx="700" cy="190" r="1.8" fill="#F4C430" />

  <!-- Via: Trace E/F junction -->
  <circle cx="730" cy="160" r="5" fill="#1B4332" stroke="#C9872E" stroke-width="1.8" />
  <circle cx="730" cy="160" r="1.8" fill="#F4C430" />

  <!-- Via: Trace F terminus -->
  <circle cx="745" cy="135" r="5" fill="#1B4332" stroke="#C9872E" stroke-width="1.8" />
  <circle cx="745" cy="135" r="1.8" fill="#F4C430" />

  <!-- Test point via: Trace C origin -->
  <circle cx="660" cy="45" r="4" fill="#1B4332" stroke="#C9872E" stroke-width="1.5" />
  <circle cx="660" cy="45" r="1.5" fill="#F4C430" />

  <!-- Test point via: bottom-right corner -->
  <circle cx="810" cy="190" r="3.5" fill="#1B4332" stroke="#C9872E" stroke-width="1.5" />
  <circle cx="810" cy="190" r="1.3" fill="#F4C430" />

  <!-- ═══ SILKSCREEN LAYER ═══ -->

  <!-- Name -->
  <text x="225" y="88" class="silk" font-size="36" font-weight="700" letter-spacing="0.12em">LEELANSH</text>
  <text x="225" y="130" class="silk" font-size="36" font-weight="700" letter-spacing="0.12em">KHARBANDA</text>

  <!-- Subtitle -->
  <text x="227" y="155" class="silk-sub" font-size="14" letter-spacing="0.04em">B.Tech ECE · IIIT-Delhi</text>
  <text x="227" y="175" class="silk-dim" font-size="12" letter-spacing="0.04em">Systems · Signals · On-Device ML</text>

  <!-- Reference designators -->
  <text x="22" y="205" class="ref">REV 03 · 2026</text>
  <text x="735" y="205" class="ref">PCB-LK-24319-IIITD</text>

</svg>
