<svg fill="none" viewBox="0 0 850 290" width="100%" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace; }
    .sans { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0.08em; font-weight: 700; }

    .fill-base { fill: #0A0A0A; }
    .fill-surface { fill: #171717; }
    .stroke-border { stroke: #262626; }
    .text-white { fill: #E5E5E5; }
    .text-muted { fill: #525252; }
    .text-cyan { fill: #00E5FF; }
    .text-pink { fill: #FF3366; }
    .glow-cyan { filter: drop-shadow(0 0 3px rgba(0, 229, 255, 0.35)); }
    .glow-pink { filter: drop-shadow(0 0 3px rgba(255, 51, 102, 0.35)); }
    .pulse { animation: pulse 2.5s infinite ease-in-out; }
  </style>

  <!-- Base -->
  <rect width="100%" height="100%" class="fill-base" rx="4" />

  <!-- Grid -->
  <defs>
    <pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#141414" stroke-width="0.6" />
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#g)" rx="4" />

  <!-- Outer frame -->
  <rect x="12" y="12" width="826" height="266" rx="3" fill="none" stroke="#1E1E1E" stroke-width="1" />

  <!-- Header bar -->
  <rect x="12" y="12" width="826" height="28" rx="3" fill="#111111" />
  <rect x="12" y="28" width="826" height="12" fill="#111111" />
  <text x="28" y="31" class="mono" font-size="11" fill="#525252" font-weight="600">SYSTEM IDENTIFICATION / TELEMETRY DASHBOARD</text>
  <text x="700" y="31" class="mono" font-size="11" fill="#525252">STAT: <tspan fill="#00E5FF">[ONLINE]</tspan></text>
  <circle cx="810" cy="26" r="4" fill="#00E5FF" class="glow-cyan pulse" />

  <!-- Central divider -->
  <line x1="425" y1="40" x2="425" y2="278" stroke="#1E1E1E" stroke-width="1" />

  <!-- ═══════════════════════════════════════ -->
  <!-- LEFT PANEL: MEMORY MAP                 -->
  <!-- ═══════════════════════════════════════ -->
  <g transform="translate(28, 58)">
    <!-- Section label -->
    <text x="0" y="0" class="sans" font-size="10" fill="#737373">MEMORY_MAP</text>
    <line x1="0" y1="8" x2="385" y2="8" stroke="#1E1E1E" stroke-width="1" />

    <!-- Column header -->
    <text x="0"   y="30" class="mono text-muted" font-size="11">ADDR</text>
    <text x="72"  y="30" class="mono text-muted" font-size="11">00 01 02 03 04 05 06 07</text>
    <text x="280" y="30" class="mono text-muted" font-size="11">DECODED</text>

    <!-- Row 1: LEELANSH -->
    <text x="0"   y="55" class="mono text-muted" font-size="12">0x4010</text>
    <text x="72"  y="55" class="mono text-cyan glow-cyan" font-size="12">4C 45 45 4C 41 4E 53 48</text>
    <text x="280" y="55" class="mono text-cyan glow-cyan" font-size="12">LEELANSH</text>

    <!-- Row 2: KHARBAND -->
    <text x="0"   y="77" class="mono text-muted" font-size="12">0x4018</text>
    <text x="72"  y="77" class="mono text-white" font-size="12">4B 48 41 52 42 41 4E 44</text>
    <text x="280" y="77" class="mono text-white" font-size="12">KHARBAND</text>

    <!-- Row 3: A....... -->
    <text x="0"   y="99" class="mono text-muted" font-size="12">0x4020</text>
    <text x="72"  y="99" class="mono text-white" font-size="12">41 00 00 00 00 00 00 00</text>
    <text x="280" y="99" class="mono text-white" font-size="12">A.......</text>

    <!-- Row 4: ECE @ II -->
    <text x="0"   y="121" class="mono text-muted" font-size="12">0x4028</text>
    <text x="72"  y="121" class="mono text-muted" font-size="12">45 43 45 20 40 20 49 49</text>
    <text x="280" y="121" class="mono text-muted" font-size="12">ECE @ II</text>

    <!-- Row 5: IT-DELHI -->
    <text x="0"   y="143" class="mono text-muted" font-size="12">0x4030</text>
    <text x="72"  y="143" class="mono text-muted" font-size="12">49 54 2D 44 45 4C 48 49</text>
    <text x="280" y="143" class="mono text-muted" font-size="12">IT-DELHI</text>

    <!-- Row 6: SYSTEMS  -->
    <text x="0"   y="165" class="mono text-muted" font-size="12">0x4038</text>
    <text x="72"  y="165" class="mono text-pink glow-pink" font-size="12">53 59 53 54 45 4D 53 20</text>
    <text x="280" y="165" class="mono text-pink glow-pink" font-size="12">SYSTEMS</text>

    <!-- Row 7: ON-DEV M -->
    <text x="0"   y="187" class="mono text-muted" font-size="12">0x4040</text>
    <text x="72"  y="187" class="mono text-pink glow-pink" font-size="12">4F 4E 2D 44 45 56 20 4D</text>
    <text x="280" y="187" class="mono text-pink glow-pink" font-size="12">ON-DEV M</text>

    <!-- Row 8: L....... -->
    <text x="0"   y="209" class="mono text-muted" font-size="12">0x4048</text>
    <text x="72"  y="209" class="mono text-pink glow-pink" font-size="12">4C 00 00 00 00 00 00 00</text>
    <text x="280" y="209" class="mono text-pink glow-pink" font-size="12">L.......</text>
  </g>

  <!-- ═══════════════════════════════════════ -->
  <!-- RIGHT PANEL: SIGNAL ANALYSIS           -->
  <!-- ═══════════════════════════════════════ -->
  <g transform="translate(445, 58)">
    <!-- Section label -->
    <text x="0" y="0" class="sans" font-size="10" fill="#737373">SIGNAL_ANALYSIS</text>
    <line x1="0" y1="8" x2="375" y2="8" stroke="#1E1E1E" stroke-width="1" />

    <!-- Parameters -->
    <text x="0" y="30" class="mono text-muted" font-size="10">FREQ: 60Hz  |  MODE: BARE-METAL  |  ISA: RV32I</text>

    <!-- Oscilloscope viewport -->
    <rect x="0" y="42" width="375" height="145" fill="#080808" stroke="#1E1E1E" stroke-width="1" rx="2" />

    <!-- Inner grid -->
    <g transform="translate(0, 42)">
      <line x1="0" y1="29"  x2="375" y2="29"  stroke="#141414" stroke-width="0.7" />
      <line x1="0" y1="58"  x2="375" y2="58"  stroke="#141414" stroke-width="0.7" />
      <line x1="0" y1="87"  x2="375" y2="87"  stroke="#141414" stroke-width="0.7" />
      <line x1="0" y1="116" x2="375" y2="116" stroke="#141414" stroke-width="0.7" />
      <line x1="75"  y1="0" x2="75"  y2="145" stroke="#141414" stroke-width="0.7" />
      <line x1="150" y1="0" x2="150" y2="145" stroke="#141414" stroke-width="0.7" />
      <line x1="225" y1="0" x2="225" y2="145" stroke="#141414" stroke-width="0.7" />
      <line x1="300" y1="0" x2="300" y2="145" stroke="#141414" stroke-width="0.7" />

      <!-- Center axis -->
      <line x1="0" y1="72" x2="375" y2="72" stroke="#1E1E1E" stroke-dasharray="4 3" stroke-width="0.8" />

      <!-- Primary signal (cyan) -->
      <path d="M 0 72
               C 25 72, 35 22, 65 22
               S 95 122, 125 122
               S 155 30, 185 30
               S 215 115, 245 115
               S 275 38, 305 38
               S 335 95, 375 72"
            stroke="#00E5FF" stroke-width="2" fill="none" class="glow-cyan" />

      <!-- Anomaly overlay (pink spike) -->
      <path d="M 95 122 C 108 122, 115 12, 125 12 C 135 12, 142 122, 155 30"
            stroke="#FF3366" stroke-width="2.5" fill="none" class="glow-pink" />

      <!-- Anomaly marker -->
      <circle cx="125" cy="12" r="2.5" fill="#FF3366" />
      <line x1="125" y1="12" x2="160" y2="6" stroke="#FF3366" stroke-width="0.8" />
      <text x="164" y="10" class="mono text-pink" font-size="9">ANOMALY</text>

      <!-- Sync label -->
      <text x="280" y="140" class="mono text-cyan" font-size="9">LSTMs_SYNC</text>
    </g>

    <!-- Footer -->
    <text x="0" y="205" class="mono text-muted" font-size="10">SRC: CPU_PERF_COUNTERS.DAT</text>
    <text x="270" y="205" class="mono text-white" font-size="10">V_OUT: 1.25V</text>
  </g>

</svg>
